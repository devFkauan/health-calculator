<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health Calculator</title>

    <link rel="icon" type="image/icon" href="Assets/img/Icon-net.png">
    <link rel="stylesheet" href="Assets/Style/style.css">
    <link rel="stylesheet" href="Assets/Style/header.css">
    <link rel="stylesheet" href="Assets/Style/banner.css">
    <link rel="stylesheet" href="Assets/Style/tabel.css">
</head>

<body>
    <header>
        <nav>
            <div class="content-img">
                <img src="Assets/Img/logo-icon.png" alt="">
            </div>
        </nav>
    </header>

    <section class="banner">
        <h1>CALCULADORA</h1>
        <p>SAÚDE / CALCULADORA / IMC</p>
    </section>

    <section class="tabel-imc">
        <h1>TABELA DE IMC</h1>
        <table>
            <tr class="title">
                <td><p class="title-tb">Imc</p></td>
                <td><p class="title-tb">Classificação</p></td>
            </tr>
            <tr >
                <td><p class="tr-infos">Menor que 18,5</p></td>
                <td><p class="tr-infos">Abaixo do peso normal</p></td>
            </tr>
            <tr >
                <td><p class="tr-infos">18,5 a 24,9</p></td>
                <td><p class="tr-infos">Peso normal</p></td>
            </tr>
            <tr>
                <td><p class="tr-infos">25,0 a 29,9</p></td>
                <td><p class="tr-infos">Excesso de peso</p></td>
            </tr>
            <tr >
                <td><p class="tr-infos">30,0 a 34,9</p></td>
                <td><p class="tr-infos">Excesso de peso I</p></td>
            </tr>
            <tr >
                <td><p class="tr-infos">35,0 a 39,9</p></td>
                <td><p class="tr-infos">Excesso de peso II</p></td>
            </tr>
            <tr >
                <td><p class="tr-infos">Maior ou igual 40</p></td>
                <td><p class="tr-infos">Excesso de peso III</p></td>
            </tr>
        </table>
    </section>

    <section class="container" id="naveg-calcu">
        <form action="" method="post" class="form-page">


            <label for="input-peso">Peso (kg)</label>
            <input type="text" placeholder="Ex: 79.9" id="input-peso">

            <label for="input-altura">Altura</label>
            <input type="text" placeholder="Ex: 1.75" id="input-altura">

            <button type="submit" class="btn-submit">Calcular</button>

        </form>

        <div class="result">

        </div>
    </section>


    <script type="module" src="./Assets/Js/main.js"></script>
</body>

</html>
